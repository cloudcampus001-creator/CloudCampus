<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Campus — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 2rem;
        text-align: center;
      }

      .icon {
        width: 80px;
        height: 80px;
        background: #1e293b;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
        font-size: 2.5rem;
      }

      .logo {
        width: 64px;
        height: 64px;
        border-radius: 12px;
        margin-bottom: 1rem;
        opacity: 0.8;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 0.75rem;
      }

      p {
        font-size: 0.95rem;
        color: #94a3b8;
        max-width: 300px;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 9999px;
        padding: 0.4rem 1rem;
        font-size: 0.8rem;
        color: #64748b;
        margin-bottom: 2rem;
      }

      .dot {
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      button {
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        width: 100%;
        max-width: 280px;
      }

      button:hover { background: #4f46e5; }
      button:active { background: #4338ca; transform: scale(0.98); }

      .hint {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <img src="/logo.png" alt="Cloud Campus" class="logo" onerror="this.style.display='none'" />

    <div class="pill">
      <div class="dot"></div>
      No internet connection
    </div>

    <h1>You're offline</h1>
    <p>
      Check your Wi-Fi or mobile data connection, then try again. Your session
      and previously loaded data are saved.
    </p>

    <button onclick="tryReconnect()">Try again</button>

    <p class="hint">Cloud Campus will reconnect automatically when online</p>

    <script>
      function tryReconnect() {
        window.location.reload();
      }

      // Auto-reload when back online
      window.addEventListener('online', () => {
        window.location.href = '/';
      });
    </script>
  </body>
</html>
